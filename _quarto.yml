project:
  title: "hmw_1_data_analysis"

  pre-render: pre-render.py


format:
  html:
    theme: lux
  ipynb:
    ipynb-ouput: all  # compute all cells when rendering a notebook

render: # which files to render
  - report.ipynb
  - report.qmd


# output-dir: "outdir"

execute: 
  #eval: true
  #echo: false
  collapse: false
  cache: true  # cache the notebook, requires jupyter-cache
  daemon: true  # don't restart the kenel at each render



engine: jupyter

